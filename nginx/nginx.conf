events {
    worker_connections 1024;
}

http {
    # Use Docker's embedded DNS so nginx re-resolves the frontend/backend
    # hostnames on each request. Without this, rebuilding a container (which
    # gives it a new internal IP) leaves nginx pointing at the dead IP until
    # it is restarted, producing 502s on the whole site.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost acidashboard.aci.local;

        # Frontend routes — variable in proxy_pass forces per-request DNS.
        location / {
            set $frontend_upstream "frontend:3000";
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Backend API routes
        location /api/ {
            set $backend_upstream "backend:8000";
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support for Next.js dev
        location /_next/webpack-hmr {
            set $hmr_upstream "frontend:3000";
            proxy_pass http://$hmr_upstream/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
